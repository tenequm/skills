repos:
  - repo: local
    hooks:
      - id: lint-skills
        name: lint-skills
        entry: uv run python scripts/check_skills.py
        language: system
        pass_filenames: false

  # Check for secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: (pnpm-lock\.yaml|skills/.*/references/.*\.md)

  # Standard checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
